<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文案助手</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root, [data-theme="dark"] {
  --bg:           #1a1814;
  --sidebar:      #141210;
  --surface:      #252220;
  --surface2:     #2e2b28;
  --surface-hover:#322f2b;
  --border:       rgba(255,240,220,0.09);
  --border-mid:   rgba(255,240,220,0.14);
  --text:         #f0e8dc;
  --text-soft:    #c8bfb2;
  --muted:        #7a7268;
  --accent:       #c8a882;
  --accent-hover: #d4b896;
  --accent-dim:   rgba(200,168,130,0.12);
  --send-bg:      #c8a882;
  --send-color:   #1a1814;
  --user-av:      #6b5e4e;
  --ai-av:        #3d3530;
  --ai-av-border: rgba(200,168,130,0.4);
  --row-alt:      rgba(255,240,220,0.025);
  --scrollbar:    #3a3530;
  --input-meta:   #4a4540;
  --shadow:       rgba(0,0,0,0.4);
}

[data-theme="light"] {
  --bg:           #faf7f2;
  --sidebar:      #f2ede6;
  --surface:      #ede7de;
  --surface2:     #e5ddd3;
  --surface-hover:#ddd5c9;
  --border:       rgba(100,80,50,0.1);
  --border-mid:   rgba(100,80,50,0.16);
  --text:         #2a2318;
  --text-soft:    #4a3f30;
  --muted:        #9a8e80;
  --accent:       #8a6840;
  --accent-hover: #7a5830;
  --accent-dim:   rgba(138,104,64,0.1);
  --send-bg:      #2a2318;
  --send-color:   #faf7f2;
  --user-av:      #6b5e4e;
  --ai-av:        #e0d8cc;
  --ai-av-border: rgba(100,80,50,0.3);
  --row-alt:      rgba(100,80,50,0.03);
  --scrollbar:    #c8bfb2;
  --input-meta:   #b0a898;
  --shadow:       rgba(0,0,0,0.08);
}

html, body { height: 100%; font-family: 'Noto Sans SC', -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; transition: background 0.3s, color 0.3s; }
body { display: flex; overflow: hidden; }

.sidebar { width: 256px; background: var(--sidebar); display: flex; flex-direction: column; flex-shrink: 0; border-right: 1px solid var(--border); transition: background 0.3s, border-color 0.3s; }
.sidebar-top { padding: 14px 12px 10px; display: flex; gap: 8px; align-items: center; }

.new-chat-btn { flex: 1; display: flex; align-items: center; gap: 9px; padding: 9px 13px; border-radius: 10px; border: 1px solid var(--border-mid); background: transparent; color: var(--text-soft); cursor: pointer; font-family: inherit; font-size: 13px; transition: all 0.15s; }
.new-chat-btn:hover { background: var(--surface-hover); color: var(--text); }
.new-chat-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

.theme-btn { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border-mid); background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.15s; flex-shrink: 0; }
.theme-btn:hover { background: var(--surface-hover); color: var(--text); }

.sidebar-section { padding: 18px 12px 6px; }
.sidebar-label { font-size: 10px; font-weight: 500; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; padding: 0 8px; margin-bottom: 5px; }

.plat-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--muted); transition: all 0.15s; border: none; background: transparent; width: 100%; text-align: left; font-family: inherit; }
.plat-item:hover { background: var(--surface); color: var(--text-soft); }
.plat-item.active { background: var(--surface2); color: var(--text); }

.plat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.plat-dot.d { background: #c0875a; }
.plat-dot.x { background: #a07060; }
.plat-dot.b { background: conic-gradient(#c0875a 50%, #a07060 50%); }

.style-chips { padding: 3px 12px 10px; display: flex; flex-wrap: wrap; gap: 5px; }
.chip { padding: 3px 9px; border-radius: 20px; font-size: 11px; border: 1px solid var(--border-mid); color: var(--muted); cursor: pointer; transition: all 0.15s; background: transparent; font-family: inherit; }
.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

.divider { height: 1px; background: var(--border); margin: 4px 12px; }

.sidebar-footer { margin-top: auto; padding: 12px; border-top: 1px solid var(--border); }
.footer-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

.messages { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--scrollbar) transparent; }
.messages::-webkit-scrollbar { width: 5px; }
.messages::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100%; text-align: center; padding: 48px 24px; gap: 14px; }
.welcome-logo { width: 52px; height: 52px; border-radius: 14px; background: var(--surface2); border: 1px solid var(--border-mid); display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 4px; box-shadow: 0 4px 20px var(--shadow); }
.welcome h1 { font-family: 'Noto Serif SC', serif; font-size: 26px; font-weight: 400; color: var(--text); letter-spacing: 0.02em; }
.welcome p { color: var(--muted); font-size: 14px; max-width: 380px; line-height: 1.7; }

.welcome-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 10px; max-width: 460px; width: 100%; }
.welcome-card { background: var(--surface); border: 1px solid var(--border); border-radius: 11px; padding: 13px 15px; cursor: pointer; text-align: left; transition: all 0.15s; }
.welcome-card:hover { background: var(--surface-hover); border-color: var(--border-mid); transform: translateY(-1px); box-shadow: 0 4px 16px var(--shadow); }
.welcome-card-title { font-size: 13px; font-weight: 500; margin-bottom: 3px; color: var(--text-soft); }
.welcome-card-sub { font-size: 11px; color: var(--muted); }

.msg-row { padding: 22px 0; transition: background 0.15s; animation: fadeUp 0.2s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
.msg-row.assistant { background: var(--row-alt); }

.msg-inner { max-width: 700px; margin: 0 auto; padding: 0 28px; display: flex; gap: 14px; align-items: flex-start; }

.avatar { width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; margin-top: 3px; }
.avatar.user-av { background: var(--user-av); color: #e8d8c0; font-size: 11px; }
.avatar.ai-av { background: var(--ai-av); color: var(--accent); border: 1px solid var(--ai-av-border); font-size: 13px; }

.msg-content { flex: 1; font-size: 14.5px; line-height: 1.8; min-width: 0; color: var(--text-soft); }

.msg-actions { display: flex; gap: 4px; margin-top: 9px; opacity: 0; transition: opacity 0.15s; }
.msg-row:hover .msg-actions { opacity: 1; }
.action-btn { padding: 3px 8px; border-radius: 6px; border: 1px solid transparent; background: transparent; color: var(--muted); cursor: pointer; font-size: 11px; font-family: inherit; transition: all 0.15s; }
.action-btn:hover { background: var(--surface); border-color: var(--border-mid); color: var(--text-soft); }

.typing-dots { display: flex; gap: 5px; padding: 5px 0; align-items: center; }
.typing-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); animation: tdot 1.3s infinite ease-in-out; }
.typing-dots span:nth-child(2) { animation-delay: 0.15s; }
.typing-dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes tdot { 0%,60%,100% { opacity: 0.25; transform: scale(0.75); } 30% { opacity: 1; transform: scale(1); } }

.input-wrap { padding: 12px 24px 20px; max-width: 748px; margin: 0 auto; width: 100%; }
.input-box { background: var(--surface); border: 1px solid var(--border-mid); border-radius: 14px; display: flex; align-items: flex-end; padding: 11px 12px; gap: 9px; transition: border-color 0.2s, box-shadow 0.2s; box-shadow: 0 2px 12px var(--shadow); }
.input-box:focus-within { border-color: var(--accent); box-shadow: 0 2px 16px var(--shadow), 0 0 0 1px var(--accent-dim); }

textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: inherit; font-size: 14px; resize: none; min-height: 22px; max-height: 150px; line-height: 1.6; }
textarea::placeholder { color: var(--muted); }

.send-btn { width: 32px; height: 32px; border-radius: 8px; border: none; background: var(--send-bg); color: var(--send-color); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.15s, transform 0.1s; }
.send-btn:hover { opacity: 0.85; }
.send-btn:active { transform: scale(0.94); }
.send-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }
.send-btn svg { width: 15px; height: 15px; fill: currentColor; }

.suggestions { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 9px; }
.sug-btn { padding: 5px 11px; border-radius: 20px; border: 1px solid var(--border-mid); background: transparent; color: var(--muted); font-size: 11px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.sug-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

.input-meta { text-align: center; font-size: 10px; color: var(--input-meta); margin-top: 9px; letter-spacing: 0.02em; }

.preview-panel { width: 288px; border-left: 1px solid var(--border); background: var(--sidebar); display: flex; flex-direction: column; flex-shrink: 0; transition: background 0.3s, border-color 0.3s; }
.preview-header { padding: 16px 16px 12px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 7px; color: var(--text-soft); letter-spacing: 0.02em; }

.preview-body { flex: 1; overflow-y: auto; padding: 14px; scrollbar-width: thin; scrollbar-color: var(--scrollbar) transparent; }
.preview-block { margin-bottom: 18px; }
.preview-block-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
.preview-block-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); display: flex; align-items: center; gap: 5px; }
.preview-block-label::before { content: ''; display: inline-block; width: 5px; height: 5px; border-radius: 50%; }
.label-d::before { background: #c0875a; }
.label-x::before { background: #a07060; }

.copy-icon-btn { background: transparent; border: none; color: var(--muted); cursor: pointer; padding: 2px 6px; border-radius: 5px; font-size: 10px; font-family: inherit; transition: all 0.15s; }
.copy-icon-btn:hover { background: var(--surface); color: var(--text-soft); }

.preview-text { background: var(--surface); border-radius: 9px; padding: 11px 13px; font-size: 12px; line-height: 1.85; color: var(--text-soft); white-space: pre-wrap; min-height: 72px; border: 1px solid var(--border); word-break: break-all; }
.preview-empty { color: var(--muted); font-size: 11px; font-style: italic; display: flex; align-items: center; justify-content: center; height: 72px; }
.char-count { font-size: 10px; color: var(--muted); margin-top: 4px; text-align: right; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-top">
    <button class="new-chat-btn" onclick="newChat()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      新建对话
    </button>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="切换模式">🌙</button>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">目标平台</div>
    <button class="plat-item active" onclick="selectPlatform('douyin', this)"><span class="plat-dot d"></span>抖音</button>
    <button class="plat-item" onclick="selectPlatform('xhs', this)"><span class="plat-dot x"></span>小红书</button>
    <button class="plat-item" onclick="selectPlatform('both', this)"><span class="plat-dot b"></span>双平台</button>
  </div>

  <div class="divider"></div>

  <div class="sidebar-section">
    <div class="sidebar-label">文案风格</div>
  </div>
  <div class="style-chips">
    <button class="chip active" onclick="toggleChip(this)">活泼搞笑</button>
    <button class="chip" onclick="toggleChip(this)">专业干货</button>
    <button class="chip" onclick="toggleChip(this)">温情治愈</button>
    <button class="chip" onclick="toggleChip(this)">励志正能量</button>
    <button class="chip" onclick="toggleChip(this)">时尚潮流</button>
    <button class="chip" onclick="toggleChip(this)">种草安利</button>
  </div>

  <div class="sidebar-footer">
    <div class="footer-label">网站状态</div>
    <div style="font-size:12px;color:var(--accent);">✓ 已连接后端服务</div>
    <div style="font-size:11px;color:var(--muted);margin-top:4px;">API Key 由服务器安全保管</div>
  </div>
</div>

<div class="main">
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-logo">✦</div>
      <h1>文案助手</h1>
      <p>选择平台和风格，告诉我你要写什么，<br>我来帮你生成爆款文案。</p>
      <div class="welcome-grid">
        <div class="welcome-card" onclick="quickStart('帮我写一篇推广新品保温杯的文案，主打24小时保温、颜值高')">
          <div class="welcome-card-title">🛍️ 新品推广</div>
          <div class="welcome-card-sub">推广产品，突出卖点</div>
        </div>
        <div class="welcome-card" onclick="quickStart('帮我写一篇探店笔记，地点是一家网红咖啡厅，环境很好')">
          <div class="welcome-card-title">☕ 探店打卡</div>
          <div class="welcome-card-sub">门店种草，引流打卡</div>
        </div>
        <div class="welcome-card" onclick="quickStart('帮我写一篇旅行打卡文案，目的地是云南大理，三月份去的')">
          <div class="welcome-card-title">✈️ 旅行分享</div>
          <div class="welcome-card-sub">旅行记录，攻略分享</div>
        </div>
        <div class="welcome-card" onclick="quickStart('帮我写一篇护肤变美日记文案，记录我的护肤历程和产品推荐')">
          <div class="welcome-card-title">✨ 美妆护肤</div>
          <div class="welcome-card-sub">美妆种草，变美日记</div>
        </div>
      </div>
    </div>
  </div>

  <div class="input-wrap">
    <div class="input-box">
      <textarea id="userInput" placeholder="描述你想写的内容…" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="suggestions">
      <button class="sug-btn" onclick="quickStart('帮我写一个好物推荐文案，产品是无线蓝牙耳机')">好物推荐</button>
      <button class="sug-btn" onclick="quickStart('帮我写一篇减肥成功的励志分享文案')">励志分享</button>
      <button class="sug-btn" onclick="quickStart('帮我写一个美食制作教程短视频文案，菜品是麻辣香锅')">美食教程</button>
      <button class="sug-btn" onclick="quickStart('帮我写一个引导粉丝关注点赞互动的文案')">涨粉文案</button>
    </div>
    <div class="input-meta">文案助手 · 由 Claude AI 驱动</div>
  </div>
</div>

<div class="preview-panel">
  <div class="preview-header">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/>
    </svg>
    文案预览
  </div>
  <div class="preview-body">
    <div class="preview-block">
      <div class="preview-block-header">
        <span class="preview-block-label label-d">抖音</span>
        <button class="copy-icon-btn" onclick="copyPreview('douyin', event)">复制</button>
      </div>
      <div class="preview-text" id="douyinText"><div class="preview-empty">生成后展示</div></div>
      <div class="char-count" id="douyinMeta"></div>
    </div>
    <div class="preview-block">
      <div class="preview-block-header">
        <span class="preview-block-label label-x">小红书</span>
        <button class="copy-icon-btn" onclick="copyPreview('xhs', event)">复制</button>
      </div>
      <div class="preview-text" id="xhsText"><div class="preview-empty">生成后展示</div></div>
      <div class="char-count" id="xhsMeta"></div>
    </div>
  </div>
</div>

<script>
let currentPlatform = 'douyin';
let currentStyles = ['活泼搞笑'];
let history = [];
let isLoading = false;
let isDark = true;

window.onload = () => {
  const savedTheme = localStorage.getItem('theme') || 'dark';
  isDark = savedTheme === 'dark';
  applyTheme();
};

function applyTheme() {
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
}

function toggleTheme() {
  isDark = !isDark;
  applyTheme();
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

function selectPlatform(p, btn) {
  currentPlatform = p;
  document.querySelectorAll('.plat-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleChip(el) {
  el.classList.toggle('active');
  currentStyles = [...document.querySelectorAll('.chip.active')].map(e => e.textContent);
  if (!currentStyles.length) { el.classList.add('active'); currentStyles = [el.textContent]; }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 150) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function quickStart(text) {
  document.getElementById('userInput').value = text;
  autoResize(document.getElementById('userInput'));
  sendMessage();
}

function newChat() {
  history = [];
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  const w = document.createElement('div');
  w.className = 'welcome'; w.id = 'welcome';
  w.innerHTML = `<div class="welcome-logo">✦</div><h1>文案助手</h1><p>选择平台和风格，告诉我你要写什么，<br>我来帮你生成爆款文案。</p>`;
  msgs.appendChild(w);
  setPreview('douyin', '');
  setPreview('xhs', '');
}

function addMsg(role, text) {
  const w = document.getElementById('welcome');
  if (w) w.remove();
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  const inner = document.createElement('div');
  inner.className = 'msg-inner';
  const av = document.createElement('div');
  av.className = `avatar ${role === 'user' ? 'user-av' : 'ai-av'}`;
  av.textContent = role === 'user' ? '你' : '✦';
  const content = document.createElement('div');
  content.className = 'msg-content';
  content.innerHTML = text.replace(/\n/g, '<br>');
  if (role !== 'user') {
    const acts = document.createElement('div');
    acts.className = 'msg-actions';
    const btn = document.createElement('button');
    btn.className = 'action-btn';
    btn.textContent = '复制';
    btn.onclick = () => { navigator.clipboard.writeText(text); btn.textContent = '已复制'; setTimeout(() => btn.textContent = '复制', 1500); };
    acts.appendChild(btn);
    content.appendChild(acts);
  }
  inner.appendChild(av); inner.appendChild(content); row.appendChild(inner); msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row assistant'; row.id = 'typing';
  row.innerHTML = `<div class="msg-inner"><div class="avatar ai-av">✦</div><div class="msg-content"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

function setPreview(platform, text) {
  const el = document.getElementById(platform + 'Text');
  const meta = document.getElementById(platform + 'Meta');
  if (!text) { el.innerHTML = '<div class="preview-empty">生成后展示</div>'; meta.textContent = ''; return; }
  el.textContent = text;
  const tags = (text.match(/#[^#\s]+/g) || []).length;
  meta.textContent = `${text.length} 字 · ${tags} 标签`;
}

function copyPreview(platform, e) {
  const el = document.getElementById(platform + 'Text');
  const text = el.textContent;
  if (!text || text.includes('生成后展示')) return;
  navigator.clipboard.writeText(text);
  const btn = e.target; btn.textContent = '✓';
  setTimeout(() => btn.textContent = '复制', 1500);
}

function extractContent(text) {
  if (currentPlatform === 'douyin') { setPreview('douyin', text); setPreview('xhs', ''); return; }
  if (currentPlatform === 'xhs') { setPreview('xhs', text); setPreview('douyin', ''); return; }
  const dy = text.match(/【抖音[^】]*】([\s\S]*?)(?=【小红书|---)/i);
  const xhs = text.match(/【小红书[^】]*】([\s\S]*?)(?=【抖音|---|$)/i);
  setPreview('douyin', dy ? dy[1].trim() : '');
  setPreview('xhs', xhs ? xhs[1].trim() : '');
  if (!dy && !xhs) setPreview('douyin', text);
}

function buildSystem() {
  const style = currentStyles.join('、') || '活泼搞笑';
  const platNames = { douyin: '抖音', xhs: '小红书', both: '抖音和小红书' };
  return `你是专业社交媒体文案创作师，为${platNames[currentPlatform]}撰写爆款文案，风格：${style}。
${currentPlatform !== 'xhs' ? '抖音：开头抓眼球、口语化、节奏强、emoji适当、结尾引导互动、3-5个#话题#、150-250字。' : ''}
${currentPlatform !== 'douyin' ? '小红书：标题吸引人、分段用emoji标记、语气真实、具体细节、5-8个#标签、200-350字。' : ''}
${currentPlatform === 'both' ? '先输出【抖音版文案】再输出【小红书版文案】，中间用"---"分隔。' : ''}
直接给出文案，不需要解释。`;
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = ''; input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  addMsg('user', text);
  showTyping();
  history.push({ role: 'user', content: text });

  try {
    // 调用我们自己的后端接口，而不是直接调用 Anthropic
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, system: buildSystem() })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '请求失败');
    const reply = data.content[0].text;
    history.push({ role: 'assistant', content: reply });
    removeTyping();
    addMsg('assistant', reply);
    extractContent(reply);
  } catch (err) {
    removeTyping();
    addMsg('assistant', `出错了：${err.message}`);
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }
}
</script>
